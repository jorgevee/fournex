name: uncoalesced_global_loads
title: Uncoalesced Global Memory Loads
category: memory
description: >
  bad.cu reads global memory with a strided index, so adjacent threads touch
  non-adjacent addresses and each warp issues many memory sectors per request.
  good.cu uses a stride-1 coalesced access pattern.
bad_source: bad.cu
good_source: good.cu
