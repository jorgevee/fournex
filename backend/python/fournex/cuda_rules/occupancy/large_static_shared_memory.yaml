id: large_static_shared_memory
scope: kernel
category: occupancy
severity: medium
confidence: high
message: "Static shared memory allocation ≥ 48 KB may constrain occupancy on this architecture."
conditions:
  max_shared_bytes_gte: 49152
recommendations:
  - rec_ncu_reduce_shared_memory_footprint
ncu_signals:
  occupancy_pct_lt: 50.0
architecture_overrides:
  # Hopper H100 has 228 KB shared memory per SM and 32 blocks/SM.
  # 96 KB per block → 2 blocks → ~50% occupancy at 1024 threads/block.
  # Flag above 96 KB rather than 48 KB to avoid false positives on Hopper.
  sm_90:
    conditions:
      max_shared_bytes_gte: 98304
  # Blackwell — preliminary, same threshold as Hopper
  sm_100:
    conditions:
      max_shared_bytes_gte: 131072
  sm_120:
    conditions:
      max_shared_bytes_gte: 131072
