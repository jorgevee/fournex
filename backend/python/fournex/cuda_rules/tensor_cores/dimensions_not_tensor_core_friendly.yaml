id: dimensions_not_tensor_core_friendly
scope: kernel
category: tensor_cores
severity: low
confidence: medium
message: "Shared memory tile dimension(s) {tc_unfriendly_dims_str} not multiples of 16; WMMA and MMA instructions require tile alignment to 16 (or 32 on Hopper and later)."
conditions:
  tc_unfriendly_dims: true
recommendations:
  - rec_ncu_align_matmul_dims
ncu_signals:
  tensor_core_utilization_pct_lt: 30.0
architecture_overrides:
  # Hopper wgmma requires M/N tile dimensions to be multiples of 64.
  # Use tc_unfriendly_dims_hopper signal (checks % 64 instead of % 16).
  sm_90:
    message: "Shared memory tile dimension(s) {tc_unfriendly_dims_hopper_str} not multiples of 64; wgmma on Hopper (sm_90) requires M/N tile alignment to 64."
    conditions:
      tc_unfriendly_dims_hopper: true
  sm_100:
    message: "Shared memory tile dimension(s) {tc_unfriendly_dims_hopper_str} not multiples of 64; wgmma on Blackwell requires M/N tile alignment to 64."
    conditions:
      tc_unfriendly_dims_hopper: true
  sm_120:
    message: "Shared memory tile dimension(s) {tc_unfriendly_dims_hopper_str} not multiples of 64; wgmma on Blackwell requires M/N tile alignment to 64."
    conditions:
      tc_unfriendly_dims_hopper: true
