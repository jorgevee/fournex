# Hand-labeled gold set for `frx eval sakana`.
#
# Purpose: catch bad heuristics, NOT to be an exhaustive benchmark. Labels are
# assigned by independent reasoning about each kernel's metrics + outcome, then
# checked against Fournex. Three assertions per row (any may be omitted/null):
#
#   expected_primary             - the bottleneck a careful analyst would name, or
#                                  "inconclusive" when the Speed-of-Light reading
#                                  is genuinely mid-range (we WANT Fournex to not
#                                  over-pin in that case). Omit when ambiguous.
#   confidence_ceiling           - this dataset's NCU profiles lack warp-stall
#                                  data, so NO diagnosis may exceed "medium-high".
#                                  This is a structural, non-circular over-claim
#                                  guard and is asserted on every profiled row.
#   expect_correctness_warning   - true for build/runtime failures (Error text);
#                                  false for clean correct kernels. Omitted for
#                                  silent numerical mismatches (the documented
#                                  blind spot) and for correct-but-risky kernels.
#
# Coverage: fast-correct, slow-correct (memory-bound / register-bound /
# inconclusive), compile-runtime failures, and silent numerical mismatches.

# ── Level 1: matmul. Slow vs cuBLAS; Speed-of-Light is memory-bandwidth bound. ──
- row_key: "L1/T1/block_size_optimized_base#1"
  expected_primary: memory_bandwidth_saturation
  confidence_ceiling: medium-high
  expect_correctness_warning: false
  notes: "Max Bandwidth ~85%, SM ~43%; bandwidth-bound naive matmul, 0.22x torch."
