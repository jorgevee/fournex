# Rules engine v1 — maps bottleneck + signal conditions to recommendation IDs.
#
# Each rule:
#   id:               unique rule identifier
#   bottleneck:       label that must be present in bottlenecks list
#   min_score:        minimum bottleneck score required to fire
#   signals:          signal conditions (all must be true)
#   suppressed_if:    signal conditions that block this rule from firing
#   recommendations:  ordered list of rec IDs to emit
#   priority_boost:   additive boost to recommendation score (0.0–0.3)
#   explanation:      human-readable sentence for the report

# ── Input pipeline ────────────────────────────────────────────────────────────

- id: rule_input_starvation_high
  bottleneck: input_bound
  min_score: 0.35
  signals:
    input_pipeline_severe: true
    low_gpu_activity: true
  suppressed_if: {}
  recommendations:
    - rec_input_num_workers
    - rec_input_prefetch_factor
    - rec_input_move_transforms
  priority_boost: 0.25
  explanation: >
    GPU activity is low while more than 40% of step time is spent waiting for
    the DataLoader. The input pipeline is severely starving the device.

- id: rule_input_starvation_moderate
  bottleneck: input_bound
  min_score: 0.20
  signals:
    input_pipeline_stalled: true
  suppressed_if:
    input_pipeline_severe: true
  recommendations:
    - rec_input_num_workers
    - rec_input_prefetch_factor
  priority_boost: 0.10
  explanation: >
    DataLoader wait accounts for a significant fraction of step time,
    suggesting the input pipeline cannot keep pace with the GPU.

- id: rule_input_with_h2d_pressure
  bottleneck: input_bound
  min_score: 0.20
  signals:
    input_pipeline_stalled: true
    h2d_copy_stalled: true
  suppressed_if: {}
  recommendations:
    - rec_input_pinned_memory
  priority_boost: 0.15
  explanation: >
    The input pipeline is stalled and H2D transfer time is also elevated.
    Pinned memory reduces transfer latency and is the appropriate fix when
    both stalls are present; it is not recommended when copy time is low.

# ── H2D copy ─────────────────────────────────────────────────────────────────

- id: rule_copy_bound_severe
  bottleneck: copy_bound
  min_score: 0.30
  signals:
    h2d_copy_severe: true
  suppressed_if: {}
  recommendations:
    - rec_copy_pinned_memory
    - rec_copy_overlap
    - rec_copy_reduce_volume
  priority_boost: 0.20
  explanation: >
    Host-to-device transfers consume over 30% of step time. Pinned memory and
    async copy overlap should significantly reduce this stall.

- id: rule_copy_bound_moderate
  bottleneck: copy_bound
  min_score: 0.15
  signals:
    h2d_copy_stalled: true
  suppressed_if:
    h2d_copy_severe: true
  recommendations:
    - rec_copy_pinned_memory
    - rec_copy_overlap
  priority_boost: 0.10
  explanation: >
    H2D copy time is elevated. Enabling pinned memory is the lowest-effort
    first step to improve transfer throughput.

# ── Synchronization ───────────────────────────────────────────────────────────

- id: rule_sync_severe
  bottleneck: sync_bound
  min_score: 0.20
  signals:
    sync_severe: true
  suppressed_if: {}
  recommendations:
    - rec_sync_remove_item
    - rec_sync_batch_logging
    - rec_sync_reduce_explicit
  priority_boost: 0.20
  explanation: >
    Synchronization stalls are consuming over 25% of step time, blocking the
    GPU from running continuously. Eliminating .item() calls and batching
    logging are the highest-value first fixes.

- id: rule_sync_moderate
  bottleneck: sync_bound
  min_score: 0.10
  signals:
    sync_heavy: true
  suppressed_if:
    sync_severe: true
  recommendations:
    - rec_sync_remove_item
    - rec_sync_batch_logging
  priority_boost: 0.10
  explanation: >
    Synchronization overhead is present. Look for .item() and .cpu() calls
    in the training loop that force host–device round-trips.

# ── GPU underutilization ──────────────────────────────────────────────────────

- id: rule_underutilized_no_mixed_precision
  bottleneck: underutilized_gpu
  min_score: 0.30
  signals:
    very_low_gpu_activity: true
    mixed_precision_enabled: false
  suppressed_if:
    input_pipeline_stalled: true
    h2d_copy_stalled: true
    sync_heavy: true
  recommendations:
    - rec_util_mixed_precision
    - rec_util_increase_batch
    - rec_util_inspect_kernels
  priority_boost: 0.20
  explanation: >
    GPU utilization is very low and mixed precision is not enabled. Enabling
    FP16/BF16 engages tensor cores and often doubles throughput on modern GPUs.

- id: rule_underutilized_general
  bottleneck: underutilized_gpu
  min_score: 0.20
  signals:
    low_gpu_activity: true
  suppressed_if:
    input_pipeline_stalled: true
    h2d_copy_stalled: true
    sync_heavy: true
    very_low_gpu_activity: true
  recommendations:
    - rec_util_increase_batch
    - rec_util_inspect_kernels
  priority_boost: 0.10
  explanation: >
    GPU utilization is below 50%. If the input pipeline and synchronization
    overhead are healthy, the batch size may be too small to saturate the device.

# ── Kernel launch overhead ────────────────────────────────────────────────────

- id: rule_launch_bound_stable_shapes
  bottleneck: launch_bound
  min_score: 0.30
  signals:
    has_profiler_data: true
  suppressed_if:
    shapes_unstable: true
  recommendations:
    - rec_launch_torch_compile
    - rec_launch_cuda_graphs
    - rec_launch_fuse_ops
  priority_boost: 0.20
  explanation: >
    Profiler data confirms low GPU utilization with stable shapes, consistent
    with kernel launch overhead. torch.compile and CUDA Graphs are the most
    effective first mitigations.

- id: rule_launch_bound_dynamic_shapes
  bottleneck: launch_bound
  min_score: 0.30
  signals:
    has_profiler_data: true
    shapes_unstable: true
  suppressed_if: {}
  recommendations:
    - rec_launch_torch_compile
    - rec_launch_fuse_ops
    - rec_shape_bucket_inputs
  priority_boost: 0.15
  explanation: >
    Launch overhead is likely but input shapes are unstable, making CUDA
    Graphs unsafe. Stabilizing shapes first will unlock the biggest gains.

- id: rule_launch_no_profiler
  bottleneck: launch_bound
  min_score: 0.30
  signals: {}
  suppressed_if:
    has_profiler_data: true
  recommendations:
    - rec_util_inspect_kernels
    - rec_launch_torch_compile
  priority_boost: 0.05
  explanation: >
    Launch overhead is suspected but no kernel-level profiler data is available.
    Capture a profiler trace to confirm before committing to torch.compile.

# ── Memory pressure ───────────────────────────────────────────────────────────

- id: rule_memory_critical
  bottleneck: memory_pressure
  min_score: 0.90
  signals:
    memory_near_capacity: true
  suppressed_if: {}
  recommendations:
    - rec_mem_reduce_batch
    - rec_mem_gradient_checkpointing
    - rec_util_mixed_precision
    - rec_mem_reduce_alloc_churn
  priority_boost: 0.30
  explanation: >
    Peak memory usage is above 90% of device capacity. OOM errors are likely.
    Reducing batch size or enabling gradient checkpointing should be the
    immediate priority.

- id: rule_memory_moderate
  bottleneck: memory_pressure
  min_score: 0.75
  signals:
    memory_pressure_moderate: true
  suppressed_if:
    memory_near_capacity: true
    mixed_precision_enabled: true
  recommendations:
    - rec_util_mixed_precision
    - rec_mem_gradient_checkpointing
  priority_boost: 0.15
  explanation: >
    Memory usage is elevated. Enabling mixed precision is the lowest-effort
    way to reduce memory footprint and headroom for larger batches.

# ── Shape instability ─────────────────────────────────────────────────────────

- id: rule_shapes_highly_unstable
  bottleneck: shape_instability
  min_score: 0.60
  signals:
    shapes_highly_unstable: true
  suppressed_if: {}
  recommendations:
    - rec_shape_bucket_inputs
    - rec_shape_disable_dynamic
  priority_boost: 0.20
  explanation: >
    More than 60% of steps have shape changes, causing repeated recompilation
    and preventing kernel reuse. Bucketing inputs is the highest-priority fix.

- id: rule_shapes_moderately_unstable
  bottleneck: shape_instability
  min_score: 0.30
  signals:
    shapes_unstable: true
  suppressed_if:
    shapes_highly_unstable: true
  recommendations:
    - rec_shape_bucket_inputs
  priority_boost: 0.10
  explanation: >
    Shape volatility is above 30%. Grouping inputs by length or padding to
    a fixed size will reduce recompilation overhead.

# ── Insufficient telemetry ────────────────────────────────────────────────────

- id: rule_no_telemetry
  bottleneck: insufficient_telemetry
  min_score: 0.50
  signals: {}
  suppressed_if: {}
  recommendations:
    - rec_telemetry_check_hooks
    - rec_telemetry_enable_profiler
  priority_boost: 0.0
  explanation: >
    No timing or GPU utilization data was collected. Verify that telemetry
    hooks are attached and the profiler is active before the training loop.

# ── NCU: Memory bandwidth ─────────────────────────────────────────────────────

- id: rule_ncu_memory_bandwidth_bound
  bottleneck: memory_bandwidth_bound
  min_score: 0.40
  signals:
    memory_bandwidth_saturated: true
    warp_stall_is_memory: true
  suppressed_if: {}
  recommendations:
    - rec_ncu_improve_coalescing
    - rec_ncu_tiling_shared_mem
    - rec_ncu_reduce_working_set
  priority_boost: 0.20
  explanation: >
    DRAM throughput is above 70% of peak and memory stalls dominate warp
    scheduling. Access coalescing and shared-memory tiling are the most
    effective mitigations.

- id: rule_ncu_memory_bandwidth_no_warp_stall
  bottleneck: memory_bandwidth_bound
  min_score: 0.40
  signals:
    memory_bandwidth_saturated: true
  suppressed_if:
    warp_stall_is_memory: true
  recommendations:
    - rec_ncu_improve_coalescing
    - rec_ncu_reduce_working_set
  priority_boost: 0.10
  explanation: >
    DRAM throughput is elevated but warp stall data is unavailable. Improving
    memory coalescing is the safest first step.

- id: rule_ncu_cache_thrashing
  bottleneck: cache_thrashing
  min_score: 0.35
  signals:
    l1_cache_miss_heavy: true
  suppressed_if: {}
  recommendations:
    - rec_ncu_tiling_shared_mem
    - rec_ncu_reduce_working_set
  priority_boost: 0.15
  explanation: >
    L1 cache hit rate is below 40%, indicating poor data locality. Shared-memory
    tiling can dramatically reduce cache miss traffic.

- id: rule_ncu_warp_stall_memory
  bottleneck: warp_stall_memory
  min_score: 0.20
  signals:
    warp_stall_is_memory: true
  suppressed_if: {}
  recommendations:
    - rec_ncu_improve_coalescing
    - rec_ncu_tiling_shared_mem
  priority_boost: 0.15
  explanation: >
    Warp stalls are dominated by memory throttle or long-scoreboard waits,
    indicating high-latency or uncoalesced global memory access patterns.

# ── NCU: Tensor core underutilization ────────────────────────────────────────

- id: rule_ncu_tensor_core_inactive
  bottleneck: tensor_core_underutilized
  min_score: 0.30
  signals:
    tensor_core_underutilized: true
    mixed_precision_enabled: false
  suppressed_if: {}
  recommendations:
    - rec_ncu_enable_amp
    - rec_ncu_use_tensor_ops
    - rec_ncu_align_matmul_dims
  priority_boost: 0.25
  explanation: >
    Tensor core utilization is below 30% and mixed precision is not enabled.
    Enabling AMP (FP16/BF16) engages tensor cores and typically doubles
    throughput on Ampere and Hopper GPUs.

- id: rule_ncu_tensor_core_low_amp
  bottleneck: tensor_core_underutilized
  min_score: 0.30
  signals:
    tensor_core_underutilized: true
    mixed_precision_enabled: true
  suppressed_if: {}
  recommendations:
    - rec_ncu_use_tensor_ops
    - rec_ncu_align_matmul_dims
  priority_boost: 0.15
  explanation: >
    Mixed precision is enabled but tensor core utilization remains low. Matrix
    dimensions may not be aligned to multiples of 16/32, or ops may not be
    using tensor-core-optimized BLAS routines.

# ── NCU: Warp stall — sync ────────────────────────────────────────────────────

- id: rule_ncu_warp_stall_sync
  bottleneck: warp_stall_sync
  min_score: 0.20
  signals:
    warp_stall_is_sync: true
  suppressed_if: {}
  recommendations:
    - rec_ncu_reduce_syncthreads
    - rec_ncu_shared_mem_layout
  priority_boost: 0.15
  explanation: >
    Warp stalls are dominated by barrier waits, indicating frequent or
    unnecessary __syncthreads() calls. Reducing synchronization points
    or restructuring shared memory access can improve throughput.

# ── NCU: Low issue efficiency ─────────────────────────────────────────────────

- id: rule_ncu_low_issue_efficiency
  bottleneck: low_issue_efficiency
  min_score: 0.35
  signals:
    issue_efficiency_very_low: true
  suppressed_if:
    warp_stall_is_memory: true
  recommendations:
    - rec_ncu_increase_block_size
    - rec_ncu_instruction_level_parallelism
  priority_boost: 0.10
  explanation: >
    Issue slot utilization is below 40%, indicating the GPU is frequently
    unable to issue instructions. Increasing block size or adding ILP via
    loop unrolling can improve instruction throughput.

- id: rule_ncu_low_scheduler_utilization
  bottleneck: low_warp_scheduler_utilization
  min_score: 0.20
  signals:
    eligible_warps_low: true
  suppressed_if:
    warp_stall_is_memory: true
  recommendations:
    - rec_ncu_increase_block_size
    - rec_ncu_instruction_level_parallelism
  priority_boost: 0.15
  explanation: >
    Few warps are eligible to issue each scheduler cycle, so the scheduler
    often has no ready warp. More resident warps or more independent work per
    warp can improve issue throughput.

- id: rule_ncu_occupancy_limited_by_registers
  bottleneck: occupancy_limited_by_registers
  min_score: 0.25
  signals:
    occupancy_limited_by_registers: true
  suppressed_if: {}
  recommendations:
    - rec_ncu_reduce_register_pressure
    - rec_ncu_collect_metrics
  priority_boost: 0.15
  explanation: >
    Achieved or estimated occupancy is low and block residency is limited by
    registers per thread. Reducing live values or tuning launch bounds can
    increase active warps.

- id: rule_ncu_occupancy_limited_by_shared_memory
  bottleneck: occupancy_limited_by_shared_memory
  min_score: 0.25
  signals:
    occupancy_limited_by_shared_memory: true
  suppressed_if: {}
  recommendations:
    - rec_ncu_reduce_shared_memory_footprint
    - rec_ncu_shared_mem_layout
  priority_boost: 0.15
  explanation: >
    Occupancy is low and shared memory per block is limiting block residency.
    Smaller tiles, packed shared buffers, or lower dynamic shared memory can
    allow more blocks per SM.

- id: rule_ncu_occupancy_limited_by_block_size
  bottleneck: occupancy_limited_by_block_size
  min_score: 0.25
  signals:
    occupancy_limited_by_block_size: true
  suppressed_if: {}
  recommendations:
    - rec_ncu_increase_block_size
  priority_boost: 0.10
  explanation: >
    Occupancy is low and the launch shape does not provide enough resident
    threads or blocks per SM. Sweep block sizes and validate achieved occupancy.

- id: rule_ncu_insufficient_ncu_data
  bottleneck: insufficient_ncu_data
  min_score: 0.50
  signals: {}
  suppressed_if: {}
  recommendations:
    - rec_ncu_collect_metrics
  priority_boost: 0.0
  explanation: >
    The NCU export contains no performance counter data. Re-export with
    --set full or specify the required metric sections.

# PTX static analysis

- id: rule_ptx_register_spills
  bottleneck: ptx_register_spills
  min_score: 0.50
  signals:
    ptx_has_register_spills: true
  suppressed_if: {}
  recommendations:
    - rec_ptx_reduce_register_pressure
  priority_boost: 0.20
  explanation: >
    PTX contains local-memory spill loads or stores, which usually means
    register pressure is forcing values out to memory.

- id: rule_ptx_register_pressure
  bottleneck: ptx_register_pressure
  min_score: 0.45
  signals:
    ptx_high_register_count: true
  suppressed_if:
    ptx_has_register_spills: true
  recommendations:
    - rec_ptx_reduce_register_pressure
  priority_boost: 0.10
  explanation: >
    PTX virtual register count is elevated, which can reduce occupancy or
    lead to spills after compilation.

- id: rule_ptx_global_memory_heavy
  bottleneck: ptx_global_memory_heavy
  min_score: 0.45
  signals:
    ptx_global_memory_heavy: true
  suppressed_if: {}
  recommendations:
    - rec_ptx_stage_global_memory
    - rec_ncu_collect_metrics
  priority_boost: 0.10
  explanation: >
    A large fraction of PTX instructions are global memory operations. Static
    PTX cannot prove reuse, but shared-memory staging and NCU validation are
    the right next checks.

- id: rule_ptx_fp64_usage
  bottleneck: ptx_fp64_usage
  min_score: 0.30
  signals:
    ptx_has_fp64: true
  suppressed_if: {}
  recommendations:
    - rec_ptx_reduce_fp64
  priority_boost: 0.05
  explanation: >
    PTX includes FP64 arithmetic or data movement. On most non-HPC GPUs,
    double precision has much lower throughput and doubles memory footprint
    relative to FP32.

- id: rule_ptx_branch_divergence
  bottleneck: ptx_branch_divergence_risk
  min_score: 0.30
  signals:
    ptx_branch_divergence_risk: true
  suppressed_if: {}
  recommendations:
    - rec_ptx_reduce_branch_divergence
  priority_boost: 0.05
  explanation: >
    Conditional branch density is high in PTX, which can indicate warp
    divergence risk if neighboring threads take different paths.
