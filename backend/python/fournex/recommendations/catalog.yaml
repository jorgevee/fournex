# Recommendation catalog — policy definitions, not engine logic.
# Each entry is a recommendation template the rules engine can emit.

# ── Input pipeline ────────────────────────────────────────────────────────────

- id: rec_input_num_workers
  title: Increase DataLoader workers
  category: input_pipeline
  applies_to: [input_bound]
  prerequisites:
    framework: [pytorch]
  impact: high
  effort: low
  safety: medium
  action_templates:
    - "Benchmark num_workers at 4, 8, and 16 (relative to available CPU cores)."
    - "Start with num_workers = cpu_count // 2 and tune from there."
    - "Watch for step-time variance and CPU memory pressure as workers increase."
  validation_templates:
    - "GPU active fraction should rise after increasing workers."
    - "DataLoader wait fraction should drop below 0.10."
    - "Step-time standard deviation should decrease."
  caveats:
    - "Too many workers can cause CPU contention or excessive RAM pressure."
    - "On machines with few cores, gains plateau quickly."

- id: rec_input_pinned_memory
  title: Enable pinned memory for DataLoader
  category: input_pipeline
  applies_to: [input_bound, copy_bound]
  prerequisites:
    framework: [pytorch]
  impact: medium
  effort: low
  safety: high
  action_templates:
    - "Set pin_memory=True in DataLoader constructor."
    - "Verify the host has enough page-locked memory available."
  validation_templates:
    - "H2D copy time should decrease after enabling pin_memory."
    - "GPU active fraction should improve slightly."
  caveats:
    - "Pinned memory is limited; too many workers with pin_memory can exhaust it."

- id: rec_input_prefetch_factor
  title: Increase DataLoader prefetch factor
  category: input_pipeline
  applies_to: [input_bound]
  prerequisites:
    framework: [pytorch]
  impact: medium
  effort: low
  safety: high
  action_templates:
    - "Set prefetch_factor=2 or 4 (requires num_workers > 0)."
    - "Monitor RAM usage — prefetching increases memory held in worker queues."
  validation_templates:
    - "Batch-ready gaps between steps should shrink."
    - "DataLoader wait fraction should decrease."
  caveats:
    - "prefetch_factor requires num_workers >= 1."

- id: rec_input_move_transforms
  title: Move CPU-heavy transforms off the critical path
  category: input_pipeline
  applies_to: [input_bound]
  prerequisites: {}
  impact: high
  effort: medium
  safety: high
  action_templates:
    - "Profile __getitem__ to identify expensive per-sample operations."
    - "Pre-compute or cache expensive transforms (resizing, tokenizing, decoding)."
    - "Consider offline preprocessing and caching to disk or memory."
  validation_templates:
    - "DataLoader wait fraction should drop significantly."
    - "Step-time should become more consistent."
  caveats:
    - "Offline caching trades storage for compute — ensure disk I/O is not the new bottleneck."

# ── Host-to-device copy ───────────────────────────────────────────────────────

- id: rec_copy_pinned_memory
  title: Enable pinned memory to speed up H2D transfers
  category: copy
  applies_to: [copy_bound]
  prerequisites:
    framework: [pytorch]
  impact: high
  effort: low
  safety: high
  action_templates:
    - "Set pin_memory=True in DataLoader."
    - "Use tensor.pin_memory() for tensors created outside DataLoader."
  validation_templates:
    - "H2D copy fraction should drop after enabling pin_memory."
  caveats:
    - "Available pinned memory is limited by the OS."

- id: rec_copy_overlap
  title: Overlap H2D copies with compute
  category: copy
  applies_to: [copy_bound]
  prerequisites:
    framework: [pytorch]
  impact: medium
  effort: medium
  safety: medium
  action_templates:
    - "Use non_blocking=True when calling .cuda() or .to(device)."
    - "Ensure the CPU side does not immediately block on the result."
    - "Prefetch the next batch onto the GPU while the current one is processing."
  validation_templates:
    - "H2D copy time should no longer appear as a sequential stall."
    - "Step time should decrease as copy and compute overlap."
  caveats:
    - "non_blocking requires the tensor to be in pinned memory for true async behavior."

- id: rec_copy_reduce_volume
  title: Reduce host-to-device transfer volume
  category: copy
  applies_to: [copy_bound]
  prerequisites: {}
  impact: high
  effort: medium
  safety: high
  action_templates:
    - "Audit which tensors are moved to GPU each step — avoid redundant copies."
    - "Keep persistent buffers on device across steps rather than re-uploading."
    - "Move augmentation or preprocessing to GPU using frameworks like Kornia or DALI."
  validation_templates:
    - "H2D copy fraction should decrease."
    - "Bytes moved per step should drop."
  caveats: []

# ── Synchronization ───────────────────────────────────────────────────────────

- id: rec_sync_remove_item
  title: Remove .item() calls from the hot path
  category: synchronization
  applies_to: [sync_bound]
  prerequisites:
    framework: [pytorch]
  impact: high
  effort: low
  safety: high
  action_templates:
    - "Search the training loop for .item(), .cpu(), and .numpy() calls."
    - "Batch scalar reads — accumulate tensors and call .item() once per N steps."
    - "Use tensor operations instead of Python scalars in the forward/backward pass."
  validation_templates:
    - "Sync wait fraction should drop significantly."
    - "Host stall events per step should decrease."
  caveats:
    - "Some .item() calls may be load-bearing for conditional logic — audit carefully."

- id: rec_sync_batch_logging
  title: Batch and defer metric logging
  category: synchronization
  applies_to: [sync_bound]
  prerequisites: {}
  impact: medium
  effort: low
  safety: high
  action_templates:
    - "Log metrics every N steps rather than every step."
    - "Accumulate loss tensors and average before reading to CPU."
    - "Move checkpoint and logging I/O off the critical training loop."
  validation_templates:
    - "Sync events per step should decrease."
    - "Step time should become more uniform."
  caveats: []

- id: rec_sync_reduce_explicit
  title: Reduce explicit device synchronizations
  category: synchronization
  applies_to: [sync_bound]
  prerequisites: {}
  impact: medium
  effort: medium
  safety: medium
  action_templates:
    - "Search for torch.cuda.synchronize() calls and remove where not required."
    - "Avoid synchronizing inside loops — synchronize at step boundaries if needed."
    - "Replace event.synchronize() with event.wait() where possible."
  validation_templates:
    - "Sync wait fraction should drop."
    - "GPU timeline gaps should shrink."
  caveats:
    - "Some synchronization may be required for correctness — verify before removing."

# ── GPU underutilization ──────────────────────────────────────────────────────

- id: rec_util_increase_batch
  title: Increase batch size to improve GPU occupancy
  category: occupancy
  applies_to: [underutilized_gpu]
  prerequisites: {}
  impact: high
  effort: low
  safety: medium
  action_templates:
    - "Double the per-device batch size and monitor GPU utilization."
    - "Use gradient accumulation if memory prevents a larger batch."
    - "Benchmark step time per sample — it should drop as batch size grows."
  validation_templates:
    - "GPU utilization should rise above 60%."
    - "Throughput (samples/sec) should increase."
  caveats:
    - "Larger batches can affect model convergence — monitor validation metrics."
    - "Memory headroom must be sufficient."

- id: rec_util_mixed_precision
  title: Enable mixed precision (FP16/BF16) training
  category: occupancy
  applies_to: [underutilized_gpu, memory_pressure]
  prerequisites:
    framework: [pytorch]
    mixed_precision_enabled: false
  impact: high
  effort: low
  safety: medium
  action_templates:
    - "Wrap the training loop with torch.cuda.amp.autocast()."
    - "Use GradScaler to handle FP16 gradient underflow."
    - "Prefer BF16 on Ampere+ GPUs (A100, H100) for numerical stability."
  validation_templates:
    - "GPU utilization should increase — tensor cores are engaged with FP16/BF16."
    - "Step time should drop, especially for matrix-heavy workloads."
    - "Memory usage should decrease, allowing larger batches."
  caveats:
    - "Some ops do not support FP16 and will auto-cast to FP32 — check for NaN/Inf."
    - "BF16 has lower numerical precision than FP32."

- id: rec_util_inspect_kernels
  title: Profile for small or fragmented kernel execution
  category: occupancy
  applies_to: [underutilized_gpu, launch_bound]
  prerequisites: {}
  impact: medium
  effort: medium
  safety: high
  action_templates:
    - "Run torch.profiler or Nsight Systems to capture a kernel-level trace."
    - "Look for many short (<10 µs) kernels — these indicate launch overhead."
    - "Identify which ops produce the most kernel launches per step."
  validation_templates:
    - "After fusion or compile, average kernel duration should increase."
    - "Kernel launch count per step should decrease."
  caveats:
    - "Profiling adds overhead — collect only a few steps for the baseline."

# ── Kernel launch overhead ────────────────────────────────────────────────────

- id: rec_launch_torch_compile
  title: Enable torch.compile to reduce kernel launch overhead
  category: kernel_launch
  applies_to: [launch_bound, underutilized_gpu]
  prerequisites:
    framework: [pytorch]
  impact: high
  effort: low
  safety: medium
  action_templates:
    - "Wrap the model with model = torch.compile(model)."
    - "Use mode='reduce-overhead' for launch-heavy workloads."
    - "Warm up the compiled model for several steps before benchmarking."
  validation_templates:
    - "Kernel launch count per step should decrease after compilation."
    - "Step time should drop after the warm-up phase."
  caveats:
    - "torch.compile adds a one-time compilation cost on first run."
    - "Dynamic shapes can cause repeated recompilation — prefer stable shapes."
    - "Do not apply if graph breaks are severe; profile first."

- id: rec_launch_cuda_graphs
  title: Use CUDA Graphs to eliminate per-step launch overhead
  category: kernel_launch
  applies_to: [launch_bound]
  prerequisites:
    framework: [pytorch]
    shape_stable: true
  impact: high
  effort: medium
  safety: medium
  action_templates:
    - "Capture a static training step with torch.cuda.CUDAGraph()."
    - "Use torch.cuda.make_graphed_callables() for a simpler API."
    - "Ensure input shapes are fixed — CUDA Graphs require static shapes."
  validation_templates:
    - "CPU-side launch time should drop to near zero for captured steps."
    - "Step time should decrease significantly for launch-bound workloads."
  caveats:
    - "Requires static input shapes — do not use if shapes vary across steps."
    - "Graph capture and replay add complexity to the training loop."

- id: rec_launch_fuse_ops
  title: Fuse small operations to reduce kernel launch count
  category: kernel_launch
  applies_to: [launch_bound]
  prerequisites: {}
  impact: medium
  effort: medium
  safety: high
  action_templates:
    - "Replace chains of elementwise ops with fused alternatives (e.g., F.gelu vs manual)."
    - "Use torch.compile or custom Triton kernels for hot elementwise sequences."
    - "Identify high-frequency op patterns in profiler output and target them first."
  validation_templates:
    - "Kernel launch count per step should decrease."
    - "Median kernel duration should increase (fewer, larger kernels)."
  caveats: []

# ── Memory pressure ───────────────────────────────────────────────────────────

- id: rec_mem_reduce_batch
  title: Reduce batch size or sequence length to relieve memory pressure
  category: memory
  applies_to: [memory_pressure]
  prerequisites: {}
  impact: high
  effort: low
  safety: high
  action_templates:
    - "Reduce per-device batch size until peak memory drops below 80% capacity."
    - "Use gradient accumulation to maintain effective batch size."
    - "Reduce sequence length if truncation is acceptable for the task."
  validation_templates:
    - "Peak memory ratio should drop below 0.85."
    - "OOM errors should stop occurring."
  caveats:
    - "Reducing batch size may slow throughput — use gradient accumulation to compensate."

- id: rec_mem_gradient_checkpointing
  title: Enable gradient checkpointing to reduce activation memory
  category: memory
  applies_to: [memory_pressure]
  prerequisites:
    framework: [pytorch]
  impact: high
  effort: low
  safety: high
  action_templates:
    - "Call model.gradient_checkpointing_enable() for HuggingFace models."
    - "Use torch.utils.checkpoint.checkpoint() on memory-heavy layers."
    - "Target transformer blocks or large residual layers first."
  validation_templates:
    - "Peak memory usage should decrease significantly."
    - "Backward pass time may increase slightly — measure the tradeoff."
  caveats:
    - "Recomputes activations during backward — increases compute by ~30%."

- id: rec_mem_reduce_alloc_churn
  title: Reduce allocation churn and memory fragmentation
  category: memory
  applies_to: [memory_pressure]
  prerequisites: {}
  impact: medium
  effort: medium
  safety: high
  action_templates:
    - "Preallocate output buffers and reuse them across steps."
    - "Avoid creating new tensors inside the training loop when possible."
    - "Set PYTORCH_CUDA_ALLOC_CONF=max_split_size_mb:128 to reduce fragmentation."
  validation_templates:
    - "Peak memory ratio should stabilize rather than creeping up over time."
    - "Allocation/free events per step should decrease."
  caveats: []

# ── Shape instability ─────────────────────────────────────────────────────────

- id: rec_shape_bucket_inputs
  title: Bucket or pad inputs to stabilize execution shapes
  category: shape_stability
  applies_to: [shape_instability]
  prerequisites: {}
  impact: high
  effort: medium
  safety: high
  action_templates:
    - "Group samples into length buckets and pad within each bucket."
    - "Use a custom sampler that minimizes intra-batch shape variance."
    - "Pre-sort the dataset by sequence length before batching."
  validation_templates:
    - "Shape volatility ratio should drop below 0.05."
    - "torch.compile recompilation frequency should decrease."
  caveats:
    - "Bucketing can introduce mild sampling bias — shuffle within buckets."

- id: rec_shape_disable_dynamic
  title: Reduce dynamic shape overhead
  category: shape_stability
  applies_to: [shape_instability]
  prerequisites:
    framework: [pytorch]
  impact: medium
  effort: medium
  safety: medium
  action_templates:
    - "Fix input shapes where possible by padding to a maximum length."
    - "Use torch.compile(dynamic=False) if shapes are nearly static."
    - "Profile recompilation events with TORCH_LOGS=recompiles."
  validation_templates:
    - "Recompilation count should decrease."
    - "Step time variance should decrease."
  caveats:
    - "Padding wastes compute if sequences vary widely in length."

# ── Telemetry ─────────────────────────────────────────────────────────────────

- id: rec_telemetry_check_hooks
  title: Verify telemetry collection hooks are attached
  category: telemetry
  applies_to: [insufficient_telemetry]
  prerequisites: {}
  impact: high
  effort: low
  safety: high
  action_templates:
    - "Call autopilot.init() before the training loop begins."
    - "Verify that instrument_dataloader() wraps the DataLoader."
    - "Confirm step_start and step_end events appear in the event log."
  validation_templates:
    - "Event count per step should include dataloader_span and step_end records."
    - "GPU samples should appear if NVML is available."
  caveats: []

- id: rec_telemetry_enable_profiler
  title: Enable profiler to collect kernel-level data
  category: telemetry
  applies_to: [insufficient_telemetry, launch_bound]
  prerequisites:
    framework: [pytorch]
  impact: medium
  effort: low
  safety: high
  action_templates:
    - "Use torch.profiler.profile() to capture a few training steps."
    - "Export a Chrome trace and inspect kernel durations and launch gaps."
    - "Enable profiler_windows_exported to feed data into the classifier."
  validation_templates:
    - "profiler_windows_exported should be > 0 after profiling."
    - "Kernel-level evidence should appear in the bottleneck diagnosis."
  caveats:
    - "Profiling adds overhead — collect only a few steps, not the full run."

# ── NCU: Memory bandwidth & cache ─────────────────────────────────────────────

- id: rec_ncu_improve_coalescing
  title: Improve global memory access coalescing
  category: ncu_memory
  applies_to: [memory_bandwidth_bound, warp_stall_memory]
  prerequisites: {}
  impact: high
  effort: medium
  safety: high
  action_templates:
    - "Ensure adjacent threads access adjacent memory addresses (stride-1 access)."
    - "Restructure array-of-structs (AoS) layouts to struct-of-arrays (SoA) where profitable."
    - "Use Nsight Compute's memory chart to identify divergent access patterns per warp."
    - "Align buffers to 128-byte cache line boundaries."
  validation_templates:
    - "DRAM throughput % should decrease after improving coalescing."
    - "L2 hit rate should improve as fewer cache lines are fetched."
    - "Memory stall fraction should drop."
  caveats:
    - "SoA restructuring may require changes to both CPU data preparation and GPU kernel code."
    - "Some access patterns (e.g., gather operations) are inherently non-coalesced."

- id: rec_ncu_tiling_shared_mem
  title: Add shared-memory tiling to reduce DRAM traffic
  category: ncu_memory
  applies_to: [memory_bandwidth_bound, cache_thrashing, warp_stall_memory]
  prerequisites: {}
  impact: high
  effort: high
  safety: medium
  action_templates:
    - "Identify data reuse patterns in the kernel (e.g., matrix multiply tiles, convolution sliding windows)."
    - "Load data tiles from global memory into shared memory before use."
    - "Ensure tile dimensions are chosen so all threads in a block contribute to loading."
    - "Pad shared memory arrays by 1-4 elements to avoid 32-way bank conflicts."
  validation_templates:
    - "DRAM throughput % should decrease as shared memory absorbs repeated accesses."
    - "L1 cache hit rate should improve significantly."
    - "Kernel execution time should decrease."
  caveats:
    - "Shared memory is limited per SM — large tiles can reduce occupancy."
    - "Incorrect padding can introduce correctness bugs; test thoroughly."

- id: rec_ncu_reduce_working_set
  title: Reduce per-kernel working set to improve cache reuse
  category: ncu_memory
  applies_to: [memory_bandwidth_bound, cache_thrashing]
  prerequisites: {}
  impact: medium
  effort: high
  safety: medium
  action_templates:
    - "Split memory-heavy kernels into multiple passes with smaller working sets."
    - "Use FP16 or INT8 data types where precision permits to halve memory footprint."
    - "Apply register blocking: accumulate results in registers instead of global memory."
    - "Minimize the number of distinct global memory arrays accessed per kernel."
  validation_templates:
    - "L1/L2 cache hit rate should improve after reducing the working set."
    - "DRAM bandwidth pressure should decrease."
  caveats:
    - "Splitting kernels adds launch overhead — benchmark the tradeoff."
    - "Reduced precision may affect model quality; validate numerics."

# ── NCU: Compute / tensor core ────────────────────────────────────────────────

- id: rec_ncu_enable_amp
  title: Enable automatic mixed precision (AMP) to engage tensor cores
  category: ncu_compute
  applies_to: [tensor_core_underutilized]
  prerequisites:
    framework: [pytorch]
    mixed_precision_enabled: false
  impact: high
  effort: low
  safety: medium
  action_templates:
    - "Wrap the forward pass with torch.autocast(device_type='cuda', dtype=torch.float16)."
    - "Use torch.amp.GradScaler to handle FP16 gradient underflow during backward."
    - "Prefer BF16 on Ampere and Hopper GPUs (A100, H100) for improved numerical stability."
    - "Verify that critical accumulation ops (softmax, layer norm) auto-cast to FP32."
  validation_templates:
    - "Tensor core utilization in NCU should rise above 50% after enabling AMP."
    - "Step time should decrease, especially for transformer or GEMM-heavy workloads."
    - "Memory usage should decrease, potentially allowing a larger batch size."
  caveats:
    - "FP16 has limited dynamic range — watch for NaN/Inf in activations or gradients."
    - "BF16 has lower numerical precision than FP32; monitor validation metrics."
    - "Some custom ops may not have FP16 implementations and will fall back to FP32."

- id: rec_ncu_use_tensor_ops
  title: Use Tensor Core-optimized BLAS operations
  category: ncu_compute
  applies_to: [tensor_core_underutilized]
  prerequisites: {}
  impact: high
  effort: medium
  safety: high
  action_templates:
    - "Use cuBLAS GEMMEx or cublasGemmEx for matrix multiplications with FP16 inputs."
    - "Use cuDNN convolution ops — they automatically select Tensor Core paths when possible."
    - "Replace custom GEMM kernels with torch.matmul or F.linear, which dispatch to cuBLAS."
    - "Verify inputs are contiguous and in FP16/BF16 before calling BLAS routines."
  validation_templates:
    - "Tensor core utilization should increase measurably in NCU after switching to cuBLAS/cuDNN."
    - "GEMM or convolution kernel time should decrease."
  caveats:
    - "cuBLAS Tensor Core paths require inputs in FP16, BF16, or TF32 — FP32 inputs use SIMT."
    - "TF32 is enabled by default on Ampere for matmul; use torch.backends.cuda.matmul.allow_tf32."

- id: rec_ncu_align_matmul_dims
  title: Align matrix dimensions to multiples of 16 or 32 for Tensor Core efficiency
  category: ncu_compute
  applies_to: [tensor_core_underutilized]
  prerequisites: {}
  impact: medium
  effort: low
  safety: high
  action_templates:
    - "Pad batch size, sequence length, and hidden dimensions to the nearest multiple of 16."
    - "For Ampere and later GPUs, align to multiples of 32 for optimal warp-level efficiency."
    - "Check vocabulary size, embedding dimensions, and projection layer widths for alignment."
    - "Use torch.nn.utils.parametrize or padding in custom layers to enforce alignment."
  validation_templates:
    - "Tensor core utilization should improve after aligning dimensions."
    - "Wasted compute from partial tiles should decrease."
  caveats:
    - "Padding increases memory consumption proportionally — measure memory headroom."
    - "Sequence padding in NLP requires attention masking to maintain correctness."

# ── NCU: Kernel synchronization ───────────────────────────────────────────────

- id: rec_ncu_reduce_syncthreads
  title: Reduce __syncthreads() frequency
  category: ncu_sync
  applies_to: [warp_stall_sync]
  prerequisites: {}
  impact: medium
  effort: high
  safety: low
  action_templates:
    - "Audit each __syncthreads() and verify it is necessary for correctness."
    - "Merge multiple __syncthreads() barriers by rescheduling shared memory operations."
    - "Use warp-level primitives (__syncwarp(), warp shuffles) where full-block sync is unnecessary."
    - "Consider cooperative groups for fine-grained synchronization at the subwarp level."
  validation_templates:
    - "Warp stall barrier fraction should decrease in NCU after reducing sync points."
    - "Issue slot utilization should improve as warps stall less on barriers."
  caveats:
    - "Removing a necessary __syncthreads() causes race conditions and silent data corruption."
    - "Always verify correctness with test inputs before and after any sync changes."
    - "Warp-level shuffles only synchronize within a single warp (32 threads)."

- id: rec_ncu_shared_mem_layout
  title: Restructure shared memory layout to reduce bank conflicts
  category: ncu_sync
  applies_to: [warp_stall_sync]
  prerequisites: {}
  impact: medium
  effort: medium
  safety: medium
  action_templates:
    - "Pad 2D shared memory arrays by 1 column to avoid column-wise bank conflicts."
    - "Use conflict-free access patterns for reductions (e.g., sequential halving)."
    - "Verify tile dimensions are not exact multiples of 32 — prefer tile widths of 33."
    - "Use Nsight Compute's shared memory bank conflict chart to identify hot spots."
  validation_templates:
    - "Shared memory bank conflict count should decrease in NCU."
    - "Warp stall barrier fraction should decrease."
  caveats:
    - "Padding increases shared memory consumption — ensure occupancy is not impacted."

# ── NCU: Instruction throughput ───────────────────────────────────────────────

- id: rec_ncu_increase_block_size
  title: Increase thread block size to improve warp-level parallelism
  category: ncu_compute
  applies_to: [low_issue_efficiency]
  prerequisites: {}
  impact: medium
  effort: low
  safety: medium
  action_templates:
    - "Increase blockDim.x from 128 to 256 or 512 threads and benchmark."
    - "Use cudaOccupancyMaxPotentialBlockSize() to find the optimal block size."
    - "Verify that register usage does not increase disproportionately with larger blocks."
    - "Ensure shared memory per block does not exceed SM limits at the new block size."
  validation_templates:
    - "Achieved occupancy in NCU should increase after tuning block size."
    - "Issue slot utilization should improve as more warps are available to hide latency."
  caveats:
    - "Larger blocks consume more shared memory and registers per SM, potentially reducing occupancy."
    - "Very large blocks can cause register spilling if the compiler runs out of register file space."

- id: rec_ncu_instruction_level_parallelism
  title: Increase instruction-level parallelism (ILP) via loop unrolling
  category: ncu_compute
  applies_to: [low_issue_efficiency]
  prerequisites: {}
  impact: medium
  effort: high
  safety: medium
  action_templates:
    - "Add #pragma unroll N to inner loops to allow the compiler to unroll and pipeline instructions."
    - "Process 2–4 elements per thread per iteration (register blocking) instead of 1."
    - "Eliminate serial data dependencies across loop iterations where safe."
    - "Profile with NCU to confirm issue slot utilization improves after unrolling."
  validation_templates:
    - "Issue slot utilization in NCU should increase after applying ILP."
    - "Warp stall fractions for compute reasons should decrease."
  caveats:
    - "Aggressive unrolling increases register usage and can reduce occupancy."
    - "The compiler may unroll automatically at -O3; verify with cuobjdump before manual unrolling."

# ── NCU: Insufficient data ────────────────────────────────────────────────────

- id: rec_ncu_collect_metrics
  title: Re-export NCU profile with full performance counter set
  category: ncu_compute
  applies_to: [insufficient_ncu_data]
  prerequisites: {}
  impact: high
  effort: low
  safety: high
  action_templates:
    - "Re-run: ncu --set full --export report.ncu-rep --csv ./report.csv ./your_app"
    - "Alternatively: ncu --metrics dram__throughput,sm__pipe_tensor_cycles_active,... --csv ..."
    - "Use ncu --query-metrics to discover available metric names for your GPU."
  validation_templates:
    - "The exported CSV should contain Metric Name and Metric Value columns."
    - "Metrics like 'Memory Throughput' and 'Issue Slots Busy' should appear in the output."
  caveats:
    - "Full metric collection has high overhead — use --kernel-name to filter to hot kernels."
    - "Some metrics are mutually exclusive and require multiple passes."

# PTX static analysis

- id: rec_ptx_reduce_register_pressure
  title: Reduce register pressure and local-memory spills
  category: ptx_static
  applies_to: [ptx_register_spills, ptx_register_pressure]
  prerequisites: {}
  impact: high
  effort: medium
  safety: medium
  action_templates:
    - "Reduce aggressive loop unrolling or split the kernel into smaller passes."
    - "Use __launch_bounds__ to cap register allocation when occupancy is too low."
    - "Move rarely used temporaries out of the hot path or recompute cheap values instead of keeping them live."
  validation_templates:
    - "PTX local memory declarations and ld.local/st.local instructions should decrease."
    - "Nsight Compute registers-per-thread and local memory traffic should decrease."
    - "Achieved occupancy should improve if register pressure was limiting residency."
  caveats:
    - "Reducing registers can increase instruction count; benchmark the tradeoff."
    - "__launch_bounds__ can cause extra spills if set too aggressively."

